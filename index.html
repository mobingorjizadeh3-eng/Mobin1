<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobin Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { font-family: 'Orbitron', sans-serif; background-color: #0f0f0f; color: #ffffff; margin: 0; padding: 20px; text-align: center; }
        .hidden { display: none; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 20px; margin: 20px auto; border: 1px solid #333; max-width: 500px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        button { background: #ff0055; color: white; border: none; padding: 15px 25px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #ff0088; transform: translateY(-3px); box-shadow: 0 0 15px #ff0055; }
        
        /* Chat Widget Styles */
        .chat-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        #chat-box { width: 300px; height: 400px; background: #1a1a1a; border: 1px solid #ff0055; border-radius: 15px; display: none; flex-direction: column; box-shadow: 0 0 20px rgba(255,0,85,0.3); animation: slideUp 0.4s; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .chat-header { background: #ff0055; padding: 12px; font-size: 14px; font-weight: bold; }
        .chat-body { flex: 1; padding: 15px; overflow-y: auto; text-align: left; font-size: 13px; }
        .chat-input { padding: 10px; border-top: 1px solid #333; display: flex; gap: 5px; }
        input { flex: 1; background: #0f0f0f; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; outline: none; }
    </style>
</head>
<body>

    <!-- صفحه شروع (Landing) -->
    <div id="landing-page">
        <h1 style="font-size: 4em; color: #ff0055;">M</h1>
        <button onclick="showMain('en')">ENTER STUDIO</button>
        <button onclick="showMain('fa')" style="margin-top:15px;">ورود به استودیو</button>
    </div>

    <!-- بدنه اصلی سایت -->
    <div id="main-page" class="hidden">
        <h1>Mobin Studio</h1>
        <div class="card">
            <p><strong>Server Status:</strong> Online ✅</p>
        </div>
        <div id="contact-section" class="card">
            <h3>Contact Us</h3>
            <div class="social-icons" style="font-size: 30px; gap: 20px; display: flex; justify-content: center;">
                <a href="https://youtube.com/@mobin-p4e" target="_blank" style="color:#ff0000"><i class="fab fa-youtube"></i></a>
                <a href="https://www.instagram.com/mobin_gorjizadeh" target="_blank" style="color:#e1306c"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </div>

    <!-- چت هوش مصنوعی -->
    <div class="chat-container">
        <button class="chat-btn" onclick="toggleChat()" style="width: auto;"><i class="fas fa-robot"></i> AI</button>
        <div id="chat-box">
            <div class="chat-header">Mobin AI</div>
            <div id="chat-body" class="chat-body">Ask me anything!</div>
            <div class="chat-input">
                <input type="text" id="user-input" placeholder="Type...">
                <button class="chat-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        function showMain(lang) {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('main-page').classList.remove('hidden');
        }
        function toggleChat() {
            const box = document.getElementById('chat-box');
            box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
        }
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const body = document.getElementById('chat-body');
            const userText = input.value;
            if (!userText) return;
            body.innerHTML += `<p style="color:#ff0055"><b>You:</b> ${userText}</p>`;
            input.value = '';
            // اینجا API رو صدا بزن
            try {
                const response = await fetch('https://api.gap-gpt.ir/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `sk-itaxeRHYfLc5nOEGfZFhKBBoZYxX5R0IKjJuS847V59vrUqe`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: 'gpt-4o-mini', messages: [{ role: 'user', content: userText }] })
                });
                const data = await response.json();
                body.innerHTML += `<p style="color:#00d4ff"><b>AI:</b> ${data.choices[0].message.content}</p>`;
            } catch (e) {
                body.innerHTML += `<p><b>System:</b> API Error (Check Key)</p>`;
            }
        }
    </script>
</body>
</html>
