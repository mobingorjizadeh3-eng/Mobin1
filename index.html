<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobin Studio</title>
    <!-- اضافه کردن فونت برای حس بهتر -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Orbitron', sans-serif; background-color: #0f0f0f; color: #ffffff; margin: 0; padding: 20px; text-align: center; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 15px; margin: 15px auto; border: 1px solid #333; max-width: 500px; box-shadow: 0 0 10px rgba(255, 0, 85, 0.2); }
        button { background: #ff0055; color: white; border: none; padding: 15px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; transition: 0.3s; }
        button:hover { background: #ff0088; box-shadow: 0 0 15px #ff0055; }
        h1 { color: #ff0055; text-shadow: 0 0 10px #ff0055; margin-bottom: 30px; }
        .social-icons a { margin: 0 15px; text-decoration: none; font-size: 24px; color: #00d4ff; transition: 0.3s; }
        .social-icons a:hover { color: #ffffff; text-shadow: 0 0 10px #00d4ff; }
    </style>
</head>
<body>

    <div id="landing-page">
        <h1 style="font-size: 3em;">M</h1>
        <button onclick="showMain('en')">English</button>
        <button onclick="showMain('fa')" style="margin-top:10px;">فارسی</button>
    </div>

    <div id="main-page" class="hidden">
        <h1 id="title-main">Mobin Studio</h1>
        <p id="no-article">No articles available yet.</p>

        <div class="card">
            <p><strong>Server Status:</strong> <span style="color: #00ff00;">Online ✅</span></p>
            <p><strong>Current Project:</strong> Working on this website</p>
        </div>

        <div class="card">
            <h3 id="price-title">Site Creation Request</h3>
            <p id="price-desc">Price: 1,000,000 Tomans</p>
            <p id="support-desc">Countries: Iran ✅ | USA (Coming Soon)</p>
            <button onclick="document.getElementById('contact-section').scrollIntoView({behavior: 'smooth'})">Request My Site</button>
        </div>

        <div id="contact-section" class="card">
            <h3>Contact Us</h3>
            <div class="social-icons">
                <a href="https://youtube.com/@mobin-p4e">▶</a> <!-- لوگو یوتیوب -->
                <a href="https://www.instagram.com/mobin_gorjizadeh">📸</a> <!-- لوگو اینستاگرام -->
            </div>
        </div>
    </div>

    <script>
        document.getElementById('main-page').classList.add('hidden');
        function showMain(lang) {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('main-page').classList.remove('hidden');
            if (lang === 'fa') {
                document.getElementById('no-article').innerText = "فعلاً مقاله‌ای وجود ندارد؛ سایت تازه تاسیس است.";
                document.getElementById('price-title').innerText = "درخواست ساخت سایت شخصی";
                document.getElementById('price-desc').innerText = "قیمت: ۱ میلیون تومان";
                document.getElementById('support-desc').innerText = "کشورهای تحت پشتیبانی: ایران ✅ | آمریکا (به زودی)";
            }
        }
    </script>
</body>
</html>
