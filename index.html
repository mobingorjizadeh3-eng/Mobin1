<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobin Studio - AI Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { font-family: 'Orbitron', sans-serif; background-color: #0f0f0f; color: #ffffff; margin: 0; padding: 20px; text-align: center; }
        .hidden { display: none; }
        
        /* استایل ویجت چت */
        .chat-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        #chat-box { 
            width: 300px; height: 400px; background: #1a1a1a; border: 1px solid #ff0055; 
            border-radius: 15px; display: none; flex-direction: column; overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.3);
            animation: slideUp 0.4s ease-out; /* انیمیشن باز شدن */
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .chat-header { background: #ff0055; padding: 12px; font-size: 14px; font-weight: bold; }
        .chat-body { flex: 1; padding: 15px; overflow-y: auto; text-align: left; font-size: 13px; color: #ddd; }
        .chat-input { padding: 10px; border-top: 1px solid #333; display: flex; gap: 5px; }
        input { flex: 1; background: #0f0f0f; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; outline: none; }
        .chat-btn { background: #ff0055; border: none; color: white; padding: 8px 12px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .chat-btn:hover { background: #ff0088; }
    </style>
</head>
<body>

    <!-- دکمه شناور -->
    <div class="chat-container">
        <button class="chat-btn" id="open-chat" onclick="toggleChat()"><i class="fas fa-robot"></i> Mobin AI</button>
        <div id="chat-box">
            <div class="chat-header">Mobin Studio AI</div>
            <div id="chat-body" class="chat-body">Hi! How can I help you today?</div>
            <div class="chat-input">
                <input type="text" id="user-input" placeholder="Type here...">
                <button class="chat-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // API Key خودت رو اینجا جایگزین کن
        const API_KEY = 'sk-itaxeRHYfLc5nOEGfZFhKBBoZYxX5R0IKjJuS847V59vrUqe'; 
        let messageCount = 0;

        function toggleChat() {
            const box = document.getElementById('chat-box');
            const btn = document.getElementById('open-chat');
            if (box.style.display === 'flex') {
                box.style.display = 'none';
                btn.innerHTML = '<i class="fas fa-robot"></i> Mobin AI';
            } else {
                box.style.display = 'flex';
                btn.innerHTML = '<i class="fas fa-times"></i> Close';
            }
        }

        async function sendMessage() {
            if (messageCount >= 5) {
                alert("Daily limit reached! Come back tomorrow.");
                return;
            }

            const input = document.getElementById('user-input');
            const body = document.getElementById('chat-body');
            const userText = input.value;
            if (!userText) return;
            
            body.innerHTML += `<p style="color:#ff0055"><b>You:</b> ${userText}</p>`;
            input.value = '';
            messageCount++;

            try {
                const response = await fetch('https://api.gap-gpt.ir/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: 'gpt-4o-mini', messages: [{ role: 'user', content: userText }] })
                });
                const data = await response.json();
                body.innerHTML += `<p style="color:#00d4ff"><b>AI:</b> ${data.choices[0].message.content}</p>`;
                body.scrollTop = body.scrollHeight; // اسکرول خودکار به پایین
            } catch (e) {
                body.innerHTML += `<p><b>System:</b> Error connecting to AI.</p>`;
            }
        }
    </script>
</body>
</html>
